# Regenerates images/stat.svg from WakaTime and commits it — the CI equivalent of `task all`.
name: Update stats

on:
  # Allows running manually from the Actions tab
  workflow_dispatch:
  schedule:
    # Runs daily at 00:00 UTC
    - cron: '0 0 * * *'

# Needed so the workflow can push the regenerated SVG back to the repo
permissions:
  contents: write

# Avoid overlapping runs racing to push
concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Run main.py (uv)
        run: uv run main.py
        env:
          INPUT_WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/stat.svg
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "update svg"
            git push origin HEAD:master
          fi
